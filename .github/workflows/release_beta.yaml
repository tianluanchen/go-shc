name: build and release beta

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: false
        type: string
  push:
    branches: 
      - main
    paths:
      - '**.js'
      - '**.html'
      - '**.css'
      - '**.go'
      - '**.mod'
      - '**.sum'

jobs:

  build:
    runs-on: ubuntu-20.04
    # env:
    #   TAG_NAME: beta
    defaults:
      run:
        shell: bash
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'
        check-latest: true
        cache-dependency-path: go.sum

    - name: Build 
      run: |
        TAG_NAME="${{ inputs.tag }}"
        if [ -z "$TAG_NAME" ]; then
          TAG_NAME="v0.0.$(date -u +"%Y%m%d%H%M%S")"
        fi
        echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"
        mkdir -p ./bin
        bash ./build.sh
        

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
          files: "bin/*"
          tag_name: ${{ env.TAG_NAME }}
          prerelease: false
          name: "beta: ${{ env.TAG_NAME }}"
